<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Logistics Hub - Macedonia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root {
            --bg: #020c1b;
            --land: #112240;
            --border: #1e3a6a;
            --arc: #4a6fa5;
            --hub-red: #ff4d4d;
            --text: #ccd6f6;
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); overflow: hidden; 
            font-family: 'Inter', sans-serif; 
        }
        #hero-map { width: 100%; height: 100vh; position: relative; }
        svg { width: 100%; height: 100%; cursor: grab; outline: none; }
        svg:active { cursor: grabbing; }

        .country { fill: var(--land); stroke: var(--border); stroke-width: 0.3px; transition: fill 0.3s ease; }
        .flag-overlay { pointer-events: none; opacity: 0; transition: opacity 0.4s ease; }
        .country-group:hover .flag-overlay { opacity: 0.25; }

        .arc { fill: none; stroke: var(--arc); stroke-width: 0.6px; opacity: 0.25; pointer-events: none; }
        .particle { fill: var(--arc); filter: drop-shadow(0 0 2px var(--arc)); pointer-events: none; }

        /* Perfected HQ Animation - Smooth Breathe & Pulse */
        .hub-point { 
            fill: var(--hub-red); 
            stroke: none; 
            animation: dot-breathe 2.5s ease-in-out infinite;
        }
        
        .hub-pulse {
            fill: var(--hub-red);
            stroke: none;
            animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes dot-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.35); }
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 0.6; }
            80%, 100% { transform: scale(3.5); opacity: 0; }
        }

        .controls {
            position: absolute; top: 30px; left: 30px; z-index: 10;
            background: rgba(10, 25, 47, 0.75); border: 1px solid #233554;
            padding: 12px; border-radius: 4px; display: flex; flex-direction: column; gap: 8px;
            backdrop-filter: blur(10px);
        }
        button {
            background: transparent; border: 1px solid #233554;
            color: var(--text); padding: 8px 16px; border-radius: 4px;
            cursor: pointer; font-size: 12px; font-weight: 600;
            transition: 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
        }
        button:hover { background: #112240; color: #fff; border-color: var(--arc); }

        #tooltip {
            position: absolute; background: var(--bg); color: #fff;
            padding: 6px 12px; border-radius: 4px; font-size: 11px;
            font-weight: 600; opacity: 0; border: 1px solid #233554; 
            pointer-events: none; letter-spacing: 0.05em; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="hero-map">
        <div id="tooltip"></div>
        <div class="controls">
            <button onclick="zBy(1.5)">Zoom +</button>
            <button onclick="zBy(0.75)">Zoom -</button>
            <button onclick="resetView()">Reset View</button>
        </div>
        <svg id="viz"><defs></defs></svg>
    </div>

<script>
    const svg = d3.select("#viz"), g = svg.append("g"), defs = svg.select("defs");
    const macedonia = [21.745, 41.608];

    // Expanded ISO Map ensuring all countries load
    const isoMap = {
        "France": "fr", "Germany": "de", "Italy": "it", "Spain": "es", "Turkey": "tr", 
        "Bulgaria": "bg", "Greece": "gr", "Ukraine": "ua", "Estonia": "ee", "Latvia": "lv", 
        "Lithuania": "lt", "Poland": "pl", "Portugal": "pt", "Romania": "ro", "Serbia": "rs", 
        "Albania": "al", "Sweden": "se", "Denmark": "dk", "Austria": "at", "Switzerland": "ch", 
        "Netherlands": "nl", "Belgium": "be", "Czechia": "cz", "Hungary": "hu", "Slovakia": "sk",
        "United Kingdom": "gb", "Norway": "no", "Finland": "fi", "North Macedonia": "mk", 
        "Ireland": "ie", "Moldova": "md", "Belarus": "by", "Croatia": "hr", "Slovenia": "si",
        "Montenegro": "me", "Kosovo": "xk", "Bosnia and Herz.": "ba"
    };

    const projection = d3.geoMercator().center([15, 52]).scale(900).translate([window.innerWidth/2, window.innerHeight/2]);
    const pathGenerator = d3.geoPath().projection(projection);

    const zoom = d3.zoom().scaleExtent([1, 15]).on("zoom", (e) => g.attr("transform", e.transform));
    svg.call(zoom).on("wheel.zoom", null);

    function zBy(f) { svg.transition().duration(500).call(zoom.scaleBy, f); }
    function resetView() { 
        const h = projection(macedonia);
        svg.transition().duration(1000).call(zoom.transform, d3.zoomIdentity.translate(window.innerWidth/2 - h[0]*3, window.innerHeight/2 - h[1]*3).scale(3)); 
    }

    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(topology => {
        const countries = topojson.feature(topology, topology.objects.countries);
        
        const countryGroups = g.selectAll(".country-group")
            .data(countries.features)
            .enter().append("g")
            .attr("class", "country-group");

        countryGroups.append("path")
            .attr("class", "country")
            .attr("d", pathGenerator)
            .on("mouseover", (e, d) => d3.select("#tooltip").style("opacity", 1).text(d.properties.name))
            .on("mousemove", (e) => d3.select("#tooltip").style("left", (e.pageX+15)+"px").style("top", (e.pageY-20)+"px"))
            .on("mouseout", () => d3.select("#tooltip").style("opacity", 0));

        countryGroups.each(function(d) {
            const iso = isoMap[d.properties.name];
            if (iso) {
                const group = d3.select(this);
                
                // CRITICAL FIX: Calculate the bounding box ONLY for the largest mainland polygon.
                // This stops overseas territories (French Guiana, Canary Islands) from stretching the flag.
                let targetGeom = d.geometry;
                if (targetGeom && targetGeom.type === 'MultiPolygon') {
                    let maxArea = -1;
                    let mainPoly = null;
                    targetGeom.coordinates.forEach(coords => {
                        const poly = {type: 'Polygon', coordinates: coords};
                        const area = d3.geoArea({type: 'Feature', geometry: poly});
                        if (area > maxArea) {
                            maxArea = area;
                            mainPoly = poly;
                        }
                    });
                    if (mainPoly) targetGeom = mainPoly;
                }

                // Apply the tightly-wrapped bounding box to the flag image
                const bounds = pathGenerator.bounds({type: 'Feature', geometry: targetGeom});
                const x = bounds[0][0], y = bounds[0][1];
                const w = bounds[1][0] - x, h = bounds[1][1] - y;
                const clipId = `clip-${iso}-${Math.floor(Math.random()*100000)}`;
                
                // The clip path still uses the FULL country so islands aren't cut out, but the image centers on mainland
                defs.append("clipPath").attr("id", clipId).append("path").attr("d", pathGenerator(d));

                group.append("image")
                    .attr("class", "flag-overlay")
                    .attr("xlink:href", `https://flagcdn.com/w640/${iso}.png`)
                    .attr("x", x).attr("y", y).attr("width", w).attr("height", h)
                    .attr("preserveAspectRatio", "xMidYMid slice")
                    .attr("clip-path", `url(#${clipId})`);
            }
        });

        const start = projection(macedonia);
        const targets = [
            {n:"France", c:[2.2,46.2]}, {n:"Germany", c:[10.4,51.1]}, {n:"Italy", c:[12.5,41.8]}, {n:"Spain", c:[-3.7,40.4]},
            {n:"Turkey", c:[35.2,38.9]}, {n:"Bulgaria", c:[25.4,42.7]}, {n:"Greece", c:[22.9,39.0]}, {n:"Ukraine", c:[31.1,48.3]},
            {n:"Estonia", c:[25.0,58.5]}, {n:"Latvia", c:[24.6,56.8]}, {n:"Lithuania", c:[23.8,55.1]}, {n:"Poland", c:[19.1,51.9]},
            {n:"Portugal", c:[-8.2,39.3]}, {n:"Romania", c:[24.9,45.9]}, {n:"Serbia", c:[20.9,44.0]}, {n:"Albania", c:[20.1,41.1]},
            {n:"Sweden", c:[18.1,59.3]}, {n:"Denmark", c:[9.5,56.2]}, {n:"Austria", c:[14.5,47.5]}, 
            {n:"Switzerland", c:[8.2,46.8]}, {n:"Netherlands", c:[5.2,52.1]}, {n:"Belgium", c:[4.4,50.5]},
            {n:"Czechia", c:[15.4,49.8]}, {n:"Hungary", c:[19.5,47.1]}, {n:"Slovakia", c:[19.6,48.6]}
        ];

        targets.forEach((t, i) => {
            const end = projection(t.c);
            const dx = end[0]-start[0], dy = end[1]-start[1], dr = Math.sqrt(dx*dx+dy*dy)*1.4;
            const route = g.append("path").attr("class", "arc").attr("d", `M${start[0]},${start[1]}A${dr},${dr} 0 0,1 ${end[0]},${end[1]}`);
            const dot = g.append("circle").attr("r", 1.2).attr("class", "particle"), length = route.node().getTotalLength();

            (function animate() {
                dot.transition().duration(4000 + Math.random()*2000).delay(i*150).ease(d3.easeQuadInOut)
                    .attrTween("transform", () => t => {
                        const pt = route.node().getPointAtLength(t*length);
                        return `translate(${pt.x},${pt.y})`;
                    }).on("end", animate);
            })();
        });

        // Restored & Perfected HQ Hub
        const hqGroup = g.append("g").attr("transform", `translate(${start[0]}, ${start[1]})`);
        hqGroup.append("circle").attr("class", "hub-pulse").attr("r", 8).attr("cx", 0).attr("cy", 0);
        hqGroup.append("circle").attr("class", "hub-point").attr("r", 4).attr("cx", 0).attr("cy", 0);

        resetView();
    });
</script>
</body>
</html>
